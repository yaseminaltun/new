<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>İyi ki doğdun Sude!</title>
  <style>
    :root { 
      --pink-light: #fff0f3;
      --pink-mid: #ffb7c5;
      --pink-dark: #ff85a1;
      --accent: #ff4d6d;
      --frosting: #ffccd5; /* Yeni sos rengi değişkeni */
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
      overflow: hidden;
    }

    .card {
      width: min(500px, 92vw);
      padding: 40px 30px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 25px 50px -12px rgba(255, 133, 161, 0.25);
      backdrop-filter: blur(15px);
      text-align: center;
      position: relative;
      z-index: 10;
    }

    h1 {
      color: var(--accent);
      margin: 0 0 10px;
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
    }

    .sub {
      color: #7c4b56;
      margin: 0 0 30px;
      font-weight: 500;
      font-size: 16px;
    }

    .cake-container {
      position: relative;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 40px;
    }

    .cake {
      position: relative;
      width: 200px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .cake:hover { transform: scale(1.02); }

    .plate {
      width: 240px;
      height: 15px;
      background: #f1f1f1;
      border-radius: 50%;
      box-shadow: 0 8px 0 #ddd;
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
    }

    .layer {
      width: 200px;
      border-radius: 15px 15px 10px 10px;
      position: relative;
    }

    .layer-bottom {
      height: 60px;
      background: #ffc2d1; 
      box-shadow: inset 0 -5px 0 rgba(0,0,0,0.05);
    }

    .layer-top {
      height: 50px;
      background: #ffb3c1;
      width: 180px;
      margin: 0 auto;
      border-radius: 12px 12px 5px 5px;
    }

    .icing-dripping {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 20px;
      background: var(--frosting); /* GÜNCELLENDİ */
      border-radius: 12px 12px 0 0;
      z-index: 2;
    }

    .drip {
      position: absolute;
      background: var(--frosting); /* GÜNCELLENDİ */
      width: 20px;
      height: 25px;
      border-radius: 0 0 10px 10px;
      top: 15px;
    }
    .drip-1 { left: 10px; height: 30px; }
    .drip-2 { left: 50px; height: 40px; }
    .drip-3 { right: 40px; height: 35px; }
    .drip-4 { right: 10px; height: 28px; }

    .candle {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 55px;
      background: linear-gradient(to bottom, #ff99ac, #fff);
      border-radius: 6px;
      z-index: 10;
    }

    .flame {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 28px;
      background: #ff9d00;
      border-radius: 50% 50% 20% 20%;
      box-shadow: 0 0 20px #ff9d00;
      animation: flicker 0.1s infinite alternate;
    }

    .flame.off { display: none; }

    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.1) rotate(2deg); }
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 16px 32px;
      border-radius: 20px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #playBtn {
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
    }

    #playBtn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 77, 109, 0.4); }

    #blowBtn {
      background: white;
      color: var(--accent);
      border: 2px solid #ffe4e9;
    }

    #blowBtn:hover { background: #fff0f3; }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      z-index: 1;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <main class="card">
    <h1 id="title">🎀 İyi ki doğdun Sude!</h1>
    <p class="sub" id="subtitle">Yeni yaşın sana tüm güzellikleri getirsin.</p>

    <div class="cake-container">
      <div class="cake" id="mainCake">
        <div class="candle">
          <div class="flame" id="flame"></div>
        </div>
        <div class="layer layer-top">
          <div class="icing-dripping"></div>
          <div class="drip drip-1"></div>
          <div class="drip drip-2"></div>
          <div class="drip drip-3"></div>
          <div class="drip drip-4"></div>
        </div>
        <div class="layer layer-bottom"></div>
        <div class="plate"></div>
      </div>
    </div>

    <div class="controls">
      <button id="playBtn">Kutlamayı Başlat 🎵</button>
      <button id="blowBtn">Mumu Üfle 💨</button>
    </div>

    <audio id="birthdaySong" src="dogum-gunu.mp3" preload="auto"></audio>
  </main>

  <script>
    const flame = document.getElementById("flame");
    const song = document.getElementById("birthdaySong");
    const playBtn = document.getElementById("playBtn");
    const blowBtn = document.getElementById("blowBtn");
    const cake = document.getElementById("mainCake");

    function createConfetti() {
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti-piece";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-10px";
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 70%)`;
        confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        confetti.style.animationDelay = Math.random() * 2 + "s";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
    }

    playBtn.addEventListener("click", () => {
      song.currentTime = 0;
      song.play().catch(() => console.log("Müzik dosyası yüklenemedi."));
      flame.classList.remove("off");
      createConfetti();
    });

    blowBtn.addEventListener("click", () => {
      if (!flame.classList.contains("off")) {
        flame.classList.add("off");
        createConfetti();
      }
    });

    cake.addEventListener("click", () => {
      flame.classList.toggle("off");
      if (flame.classList.contains("off")) createConfetti();
    });

    song.addEventListener("ended", createConfetti);
  </script>
</body>
</html>
